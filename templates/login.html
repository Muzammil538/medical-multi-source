{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center h-screen">
    <form method="POST" class="bg-gray-800 p-8 rounded-xl w-96 shadow-lg">
        <h2 class="text-2xl mb-4 font-bold text-center">Login</h2>
        <input name="username" placeholder="Username"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <input type="password" name="password" placeholder="Password"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <button class="w-full bg-blue-600 p-2 rounded hover:bg-blue-700">
            Login
        </button>
        <p class="mt-4 text-sm text-center">
            No account?
            <a href="/register" class="text-blue-400">Register</a>
        </p>
    </form>
</div>
{% endblock %}
