{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-center h-screen">
  <form method="POST" class="glass neon-border p-10 rounded-2xl w-96">

    <h2 class="text-3xl font-bold text-center mb-6">MedInsight AI</h2>

    <input name="username" placeholder="Username"
      class="w-full p-3 mb-4 rounded bg-black/40">

    <input type="password" name="password" placeholder="Password"
      class="w-full p-3 mb-4 rounded bg-black/40">

    <button class="w-full bg-pink-600 p-3 rounded-lg hover:bg-pink-700">
      Login
    </button>

    <p class="text-center mt-4">
      <a href="/register" class="text-pink-400">Create account</a>
    </p>

  </form>
</div>

{% endblock %}
