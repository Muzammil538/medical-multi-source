{% extends "base.html" %}
{% block content %}

<div class="container mt-5">

  <h3>Consultation History</h3>

  {% for s in sessions %}
    <div class="card p-3 mb-2">
      <p><b>{{ s.title }}</b></p>
      <p class="text-muted">{{ s.created_at }}</p>
      <a href="/chat/{{ s.id }}" class="btn btn-sm btn-primary">Open</a>
    </div>
  {% endfor %}

</div>

{% endblock %}
