{% extends "base.html" %}
{% block content %}

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 w-50">

    <h3 class="text-center text-primary">Create Account</h3>

    <form method="POST">
      <input name="username" class="form-control mb-2" placeholder="Username">
      <input type="password" name="password" class="form-control mb-2" placeholder="Password">
      <input name="age" class="form-control mb-2" placeholder="Age">
      <input name="gender" class="form-control mb-2" placeholder="Gender">
      <input name="medical_condition" class="form-control mb-3" placeholder="Condition">

      <button class="btn btn-success w-100">Register</button>
    </form>

  </div>
</div>

{% endblock %}
