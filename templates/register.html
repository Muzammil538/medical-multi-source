{% extends "base.html" %}
{% block content %}

<div class="flex items-center justify-center h-screen">
  <form method="POST" class="glass neon-border p-10 rounded-2xl w-96">

    <h2 class="text-2xl mb-4 text-center">Create Account</h2>

    <input name="username" placeholder="Username" class="w-full p-2 mb-3 bg-black/40 rounded">
    <input type="password" name="password" placeholder="Password" class="w-full p-2 mb-3 bg-black/40 rounded">
    <input name="age" placeholder="Age" class="w-full p-2 mb-3 bg-black/40 rounded">
    <input name="gender" placeholder="Gender" class="w-full p-2 mb-3 bg-black/40 rounded">
    <input name="medical_condition" placeholder="Condition" class="w-full p-2 mb-3 bg-black/40 rounded">

    <button class="w-full bg-green-600 p-2 rounded">Register</button>

  </form>
</div>

{% endblock %}
