{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center h-screen">
    <form method="POST" class="bg-gray-800 p-8 rounded-xl w-96 shadow-lg">
        <h2 class="text-2xl mb-4 font-bold text-center">Register</h2>
        <input name="username" placeholder="Username"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <input type="password" name="password" placeholder="Password"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <input name="age" placeholder="Age"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <input name="gender" placeholder="Gender"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <input name="medical_condition" placeholder="Medical Condition"
               class="w-full mb-3 p-2 rounded bg-gray-700">
        <button class="w-full bg-green-600 p-2 rounded hover:bg-green-700">
            Register
        </button>
    </form>
</div>
{% endblock %}
